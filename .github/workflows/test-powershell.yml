name: Test PowerShell

on:
    push:
        paths-ignore:
            - '*.md'
            - 'Docs/**'
            - 'Examples/**'
            - '.gitignore'
    pull_request:
        paths-ignore:
            - '*.md'
            - 'Docs/**'
            - 'Examples/**'
            - '.gitignore'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    test-windows-ps5:
        name: Windows PowerShell 5.1
        runs-on: windows-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Run PowerShell tests
              shell: powershell
              run: .\CleanupMonster.Tests.ps1

    test-windows-ps7:
        name: PowerShell 7
        runs-on: windows-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Run PowerShell tests
              shell: pwsh
              run: .\CleanupMonster.Tests.ps1
